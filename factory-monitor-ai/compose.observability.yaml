name: factory-monitor-ai

# ---------------------------------------------------------------------------
# Observability stack — merge overlay for factory-monitor-ai
#
# Usage:
#   docker compose -f compose.yaml -f compose.observability.yaml \
#     --profile obs up -d
#
# All observability services carry `profiles: [obs]` so they are excluded from
# a plain `docker compose up`.  The five app-service stanzas below are
# MERGE-ONLY overrides (no image/build/profiles) that inject
# OTEL_EXPORTER_OTLP_ENDPOINT onto the base service definitions.
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # OpenTelemetry Collector
  # -------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    profiles: [obs]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector self-metrics
    depends_on:
      - tempo

  # -------------------------------------------------------------------------
  # Grafana Tempo (distributed tracing backend)
  # -------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.6.0
    profiles: [obs]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # -------------------------------------------------------------------------
  # Prometheus
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [obs]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=6h"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - kafka-exporter
      - postgres-exporter
      - redis-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # -------------------------------------------------------------------------
  # Alertmanager
  # -------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [obs]
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # -------------------------------------------------------------------------
  # Loki (log aggregation)
  # -------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.0
    profiles: [obs]
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - lokidata:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -------------------------------------------------------------------------
  # Promtail (log shipper → Loki)
  # -------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.0
    profiles: [obs]
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./observability/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      - loki

  # -------------------------------------------------------------------------
  # Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    profiles: [obs]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -------------------------------------------------------------------------
  # Kafka Exporter
  # -------------------------------------------------------------------------
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    profiles: [obs]
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    depends_on:
      - kafka

  # -------------------------------------------------------------------------
  # Postgres Exporter
  # -------------------------------------------------------------------------
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    profiles: [obs]
    environment:
      DATA_SOURCE_NAME: "postgresql://factory:factory@postgres:5432/factory?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  # -------------------------------------------------------------------------
  # Redis Exporter
  # -------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    profiles: [obs]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis

  # =========================================================================
  # Merge-only app overrides — inject OTLP endpoint onto base app services.
  # NO image/build/profiles here; Compose deep-merges the environment block.
  # telemetry.py appends /v1/traces, so we supply the bare base URL only.
  # =========================================================================

  api:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"

  ingest_worker:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"

  escalation_worker:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"

  notifier_worker:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"

  edge:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"

# ---------------------------------------------------------------------------
# Named volumes for observability data
# ---------------------------------------------------------------------------
volumes:
  tempodata:
  prometheusdata:
  lokidata:
  grafanadata:
  alertmanagerdata:
  promtail-positions:
