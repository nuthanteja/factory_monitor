name: factory-monitor-ai

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factory} -d ${POSTGRES_DB:-factory}"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9094 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    volumes:
      - kafkadata:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./infra/kafka-init.sh:/kafka-init.sh:ro
    entrypoint: ["bash", "/kafka-init.sh"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8889:8889"
    volumes:
      - ./footage/mediamtx.yml:/mediamtx.yml:ro
      - ./footage/clips:/footage/clips:ro

  migrate:
    image: python:3.11-slim
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    environment:
      ALEMBIC_DATABASE_URL: postgresql://${POSTGRES_USER:-factory}:${POSTGRES_PASSWORD:-factory}@postgres:5432/${POSTGRES_DB:-factory}
    volumes:
      - .:/app:ro
    entrypoint:
      - bash
      - -c
      - >
        pip install --quiet "alembic>=1.13" "sqlalchemy[asyncio]>=2.0.30"
        "psycopg2-binary>=2.9" "pydantic>=2.7" "pydantic-settings>=2.3" &&
        alembic -c cloud/migrations/alembic.ini upgrade head

  api:
    build:
      context: .
      dockerfile: cloud/api/Dockerfile
    image: factory-monitor/api:dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql+asyncpg://factory:factory@postgres:5432/factory"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_ANOMALIES_TOPIC: "vision.anomalies.v1"
      KAFKA_DLQ_TOPIC: "vision.anomalies.dlq"
      KAFKA_CONSUMER_GROUP: "ingest-worker"
      OPERATOR_GRACE_SECONDS: "120"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ingest_worker:
    build:
      context: .
      dockerfile: cloud/ingest_worker/Dockerfile
    image: factory-monitor/ingest-worker:dev
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql+asyncpg://factory:factory@postgres:5432/factory"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_ANOMALIES_TOPIC: "vision.anomalies.v1"
      KAFKA_DLQ_TOPIC: "vision.anomalies.dlq"
      KAFKA_CONSUMER_GROUP: "ingest-worker"
      OPERATOR_GRACE_SECONDS: "120"
      REDIS_URL: "redis://redis:6379/0"
    restart: unless-stopped

  edge:
    profiles: ["edge"]
    build:
      context: .
      dockerfile: edge/Dockerfile
      args:
        BASE_IMAGE: python:3.11-slim-bookworm
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mediamtx:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      EDGE_WEIGHTS: /app/edge/models/yolov8n.pt
      PPE_WEIGHTS_URL: ${PPE_WEIGHTS_URL:-}

volumes:
  pgdata:
  kafkadata:
