apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "factory-monitor.fullname" . }}-api
  labels:
    {{- include "factory-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ include "factory-monitor.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "factory-monitor.fullname" . }}-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        {{- include "factory-monitor.waitForDb" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "factory-monitor.fullname" . }}-app
            - secretRef:
                name: {{ include "factory-monitor.fullname" . }}-app
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
