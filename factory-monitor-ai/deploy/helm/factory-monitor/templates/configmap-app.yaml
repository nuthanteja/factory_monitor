apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "factory-monitor.fullname" . }}-app
  labels:
    {{- include "factory-monitor.labels" . | nindent 4 }}
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_ANOMALIES_TOPIC: "vision.anomalies.v1"
  KAFKA_DLQ_TOPIC: "vision.anomalies.dlq"
  KAFKA_CONSUMER_GROUP: "ingest-worker"
  KAFKA_HEATMAP_TOPIC: "vision.heatmap.v1"
  KAFKA_HEATMAP_GROUP: "heatmap-worker"
  REDIS_URL: "redis://redis:6379/0"
  WS_REDIS_CHANNEL: "dashboard:incidents"
  HEATMAP_REDIS_CHANNEL: "dashboard:heatmap"
  OPERATOR_GRACE_SECONDS: "120"
  ESCALATION_LEASE_SECONDS: "30"
  NOTIFY_PROVIDER_CHAIN: "console"
  WS_FALLBACK_POLL_SECONDS: "1.0"
  WS_FALLBACK_BATCH: "200"
  INGEST_WORKER_METRICS_PORT: "9101"
  ESCALATION_WORKER_METRICS_PORT: "9102"
  NOTIFIER_WORKER_METRICS_PORT: "9103"
  HEATMAP_WORKER_METRICS_PORT: "9104"
