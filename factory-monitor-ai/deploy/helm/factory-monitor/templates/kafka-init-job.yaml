apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "factory-monitor.fullname" . }}-kafka-init
  labels:
    {{- include "factory-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: {{ include "factory-monitor.fullname" . }}-kafka-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1; do
                echo "waiting for kafka..."
                sleep 5
              done
      containers:
        - name: kafka-init
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bash
            - /kafka-init.sh
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          volumeMounts:
            - name: kafka-init-script
              mountPath: /kafka-init.sh
              subPath: kafka-init.sh
      volumes:
        - name: kafka-init-script
          configMap:
            name: {{ include "factory-monitor.fullname" . }}-kafka-init
            defaultMode: 0755
