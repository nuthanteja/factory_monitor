apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "factory-monitor.fullname" . }}-migrate
  labels:
    {{- include "factory-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ include "factory-monitor.fullname" . }}-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U factory; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - alembic
            - -c
            - cloud/migrations/alembic.ini
            - upgrade
            - head
          env:
            - name: ALEMBIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "factory-monitor.fullname" . }}-app
                  key: ALEMBIC_DATABASE_URL
