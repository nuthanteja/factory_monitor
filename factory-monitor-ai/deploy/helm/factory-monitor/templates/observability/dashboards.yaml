{{- if .Values.observability.grafanaDashboards.enabled }}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "factory-monitor.fullname" $ }}-dashboard-{{ base $path | trimSuffix ".json" }}
  labels:
    {{- include "factory-monitor.labels" $ | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
