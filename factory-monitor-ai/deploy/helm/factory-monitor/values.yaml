image:
  pullPolicy: IfNotPresent

# ── Infra ────────────────────────────────────────────────────────────────────
postgres:
  image:
    repository: postgres
    tag: "16"
  persistence:
    storageClass: local-path
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kafka:
  image:
    repository: apache/kafka
    tag: "3.7.0"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

redis:
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── App services ─────────────────────────────────────────────────────────────
api:
  image:
    repository: factory-monitor/api
    tag: dev
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingestWorker:
  image:
    repository: factory-monitor/ingest-worker
    tag: dev
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

escalationWorker:
  image:
    repository: factory-monitor/escalation-worker
    tag: dev
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

notifierWorker:
  image:
    repository: factory-monitor/notifier-worker
    tag: dev
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

heatmapWorker:
  image:
    repository: factory-monitor/heatmap-worker
    tag: dev
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

frontend:
  image:
    repository: factory-monitor-frontend
    tag: dev
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
