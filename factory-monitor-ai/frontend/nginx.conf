server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz {
    proxy_pass http://api:8000/healthz;
    proxy_set_header Host $host;
  }

  location = /v1/traces {
    # Collector upstream: otel-collector:4318 — variable proxy defers DNS so nginx
    # boots even when the obs profile is off (collector absent → 502 on demand only).
    resolver 127.0.0.11 valid=10s;
    set $otel_collector otel-collector;
    proxy_pass http://$otel_collector:4318/v1/traces;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /ws/live {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/detections {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /whep/ {
    # MediaMTX WHEP upstream — variable proxy defers DNS so nginx boots without
    # MediaMTX running.  An explicit rewrite strips /whep/ before forwarding:
    # /whep/cam_01/whep → mediamtx:8889/cam_01/whep
    # (trailing-slash auto-strip only works with a literal upstream, not a variable)
    resolver 127.0.0.11 valid=10s;
    set $mediamtx mediamtx;
    rewrite ^/whep/(.*)$ /$1 break;
    proxy_pass http://$mediamtx:8889;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
