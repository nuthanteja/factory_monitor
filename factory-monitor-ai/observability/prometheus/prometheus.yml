global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - /etc/prometheus/rules/*.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]
scrape_configs:
  - job_name: ingest_worker
    static_configs: [{ targets: [ingest_worker:9101] }]
  - job_name: escalation_worker
    static_configs: [{ targets: [escalation_worker:9102] }]
  - job_name: notifier_worker
    static_configs: [{ targets: [notifier_worker:9103] }]
  - job_name: edge
    static_configs: [{ targets: [edge:9108] }]
  - job_name: api
    metrics_path: /metrics
    static_configs: [{ targets: [api:8000] }]
  - job_name: kafka-exporter
    static_configs: [{ targets: [kafka-exporter:9308] }]
  - job_name: postgres-exporter
    static_configs: [{ targets: [postgres-exporter:9187] }]
  - job_name: redis-exporter
    static_configs: [{ targets: [redis-exporter:9121] }]
